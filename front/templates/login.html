<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecPass - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4338ca;
            --primary-hover: #3730a3;
            --bg-gradient: linear-gradient(to bottom, #0f172a, #020617);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: #f8fafc;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            font-size: 1.75rem;
        }

        .version-tag {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .input-group-text {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-right: none;
            color: #64748b;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-box ul {
            padding-left: 1.2rem;
            margin-bottom: 0;
        }

        .info-box li {
            margin-bottom: 6px;
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="glass-card text-center">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SecPass Logo" class="brand-logo">
            </div>
            <h1>SecPass</h1>
            <span class="version-tag">SYSTEM v3.1 PRO</span>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show text-start" role="alert">
                <i class="fas fa-triangle-exclamation me-2"></i> {{ error }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <form method="POST" class="text-start">
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña Maestra</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Introduce tu contraseña maestra" required autofocus>
                    </div>
                    <p style="font-size: 0.75rem; color: #64748b; margin-top: 10px;">
                        <i class="fas fa-info-circle me-1"></i> Mínimo 8 caracteres. Esta es tu única clave de acceso.
                    </p>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Acceder a la Bóveda <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="info-box text-start">
                <p class="fw-bold mb-2 text-white" style="font-size: 0.9rem;">
                    <i class="fas fa-lock me-2 text-primary"></i> Seguridad de Grado Militar
                </p>
                <ul>
                    <li>Cifrado local AES-128 (Fernet).</li>
                    <li>La clave maestra nunca toca el servidor.</li>
                    <li>Bóveda offline autogenerada al inicio.</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
